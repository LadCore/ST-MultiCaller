<div id="multicaller-settings" class="extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>MultiCaller Router Configuration</b>
            <div class="inline-drawer-icon">▼</div>
        </div>
        <div class="inline-drawer-content">
            
            <!-- Status e Controle -->
            <div class="flex-container flex-gap10 margin-bot-10px">
                <label class="checkbox flex-container">
                    <input type="checkbox" id="router-enabled">
                    <span>Router Ativo</span>
                </label>
                <button id="router-test-btn" class="menu_button">Testar Conexão</button>
            </div>
            
            <!-- API Configuration -->
            <h4>API Configuration</h4>
            <div class="flex-container flex-column flex-gap5 margin-bot-10px">
                <label>API URL:</label>
                <input type="text" id="router-api-url" class="text_pole" placeholder="https://api.nanogpt.com/v1/chat/completions">
                
                <label>API Token:</label>
                <input type="password" id="router-api-token" class="text_pole" placeholder="sk-...">
                
                <label>Modelo:</label>
                <input type="text" id="router-model" class="text_pole" placeholder="openai/gpt-oss-120b">
                
                <div class="flex-container flex-gap10">
                    <div class="flex1">
                        <label>Temperatura:</label>
                        <input type="number" id="router-temperature" class="text_pole" min="0" max="2" step="0.1" value="0.3">
                    </div>
                    <div class="flex1">
                        <label>Contexto (msgs):</label>
                        <input type="number" id="router-context" class="text_pole" min="1" max="50" value="10">
                    </div>
                </div>
            </div>
            
            <!-- System Prompt -->
            <h4>Router System Prompt</h4>
            <div class="margin-bot-10px">
                <textarea id="router-prompt" class="text_pole textarea-auto" rows="10" placeholder="Prompt do Router..."></textarea>
                <button id="router-reset-prompt" class="menu_button margin-top-5">Resetar para Padrão</button>
            </div>
            
            <!-- Debug / Test -->
            <h4>Debug & Test</h4>
            <div class="flex-container flex-column flex-gap5 margin-bot-10px">
                <button id="router-simulate-btn" class="menu_button">Simular Decisão (com contexto atual)</button>
                <div id="router-last-response" class="margin-top-5 text_pole" style="min-height: 60px; background: #1a1a1a; padding: 10px; border-radius: 5px; font-family: monospace; white-space: pre-wrap;">
                    Última resposta do Router aparecerá aqui...
                </div>
            </div>
            
            <!-- Save Button -->
            <div class="flex-container justify-center margin-top-10px">
                <button id="router-save-btn" class="menu_button primary">Salvar Configurações</button>
            </div>
            
        </div>
    </div>
</div>

<style>
#multicaller-settings .flex-container {
    display: flex;
}
#multicaller-settings .flex-column {
    flex-direction: column;
}
#multicaller-settings .flex-gap5 {
    gap: 5px;
}
#multicaller-settings .flex-gap10 {
    gap: 10px;
}
#multicaller-settings .flex1 {
    flex: 1;
}
#multicaller-settings .margin-bot-10px {
    margin-bottom: 10px;
}
#multicaller-settings .margin-top-5 {
    margin-top: 5px;
}
#multicaller-settings .margin-top-10px {
    margin-top: 10px;
}
#multicaller-settings .justify-center {
    justify-content: center;
}
#multicaller-settings h4 {
    margin: 15px 0 10px 0;
    border-bottom: 1px solid #444;
    padding-bottom: 5px;
}
#multicaller-settings label {
    font-size: 0.9em;
    color: #ccc;
}
#multicaller-settings .primary {
    background: #2d7d46;
}
#multicaller-settings .primary:hover {
    background: #36a355;
}
</style>
